global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'content-acquisition-engine'
    static_configs:
      - targets: ['host.docker.internal:9100'] # Assumes metrics server is running on host port 9100
